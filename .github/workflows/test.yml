name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-cuda:
    name: Test CUDA - Python ${{ matrix.python-version }}
    runs-on: "torchscience-linux-cuda"
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12" ]
    steps:
      - run: "nvidia-smi"
      - uses: "actions/checkout@v4"
      - uses: "Jimver/cuda-toolkit@v0.2.29"
        with:
          cuda: "12.4.0"
          method: "network"
          use-local-cache: false
      - uses: "astral-sh/setup-uv@v6"
        with:
          python-version: ${{ matrix.python-version }}
      - run: "USE_CUDA=1 uv sync --locked --all-extras --dev"
      - run: "uv run pytest tests"
