name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-cuda:
    name: Test CUDA - Python ${{ matrix.python-version }}
    runs-on: "torchscience-linux-cuda"
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12" ]
    steps:
      - run: "nvidia-smi"
      - uses: "actions/checkout@v4"
      - uses: "astral-sh/setup-uv@v6"
        with:
          python-version: ${{ matrix.python-version }}
      - name: "Set CUDA_HOME"
        run: |
          # Find nvcc and set CUDA_HOME
          NVCC_PATH=$(which nvcc || echo "")
          if [ -n "$NVCC_PATH" ]; then
            export CUDA_HOME=$(dirname $(dirname $NVCC_PATH))
            echo "CUDA_HOME=$CUDA_HOME" >> $GITHUB_ENV
            echo "Found nvcc at: $NVCC_PATH"
            echo "Setting CUDA_HOME to: $CUDA_HOME"
          else
            # Try common CUDA locations
            for cuda_path in /usr/local/cuda /usr/local/cuda-* /opt/cuda; do
              if [ -f "$cuda_path/bin/nvcc" ]; then
                export CUDA_HOME=$cuda_path
                echo "CUDA_HOME=$CUDA_HOME" >> $GITHUB_ENV
                echo "Found CUDA at: $cuda_path"
                break
              fi
            done
          fi
          # Verify CUDA_HOME
          if [ -n "$CUDA_HOME" ]; then
            echo "Final CUDA_HOME: $CUDA_HOME"
            $CUDA_HOME/bin/nvcc --version
          else
            echo "WARNING: Could not find CUDA installation"
          fi
      - run: "USE_CUDA=1 uv sync --locked --all-extras --dev"
      - run: "uv run pytest tests"
