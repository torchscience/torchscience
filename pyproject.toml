[build-system]
requires = [
    "numpy",
    "scikit-build-core>=0.10",
    "torch>=2.9.1",
]
build-backend = "scikit_build_core.build"

[project]
authors = [
    { name = "Allen Goodman", email = "allen.goodman@icloud.com" },
]
dependencies = [
    "numpy",
    "torch>=2.9.1",
]
description = "PyTorch operators for mathematics, science, and engineering."
name = "torchscience"
readme = "README.md"
requires-python = ">=3.13"
version = "0.1.0"

[dependency-groups]
dev = [
    "hypothesis",
    "matplotlib",
    "pdoc>=16.0.0",
    "pytest",
    "scipy",
]

[tool.scikit-build]
build-dir = "build/{wheel_tag}"
minimum-version = "build-system.requires"

[tool.uv]
cache-keys = [
    { file = "CMakeLists.txt" },
    { file = "pyproject.toml" },
    { file = "src/**/*.{h,c,hpp,cpp}" },
]
