name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-cuda:
    name: Test CUDA - Python ${{ matrix.python-version }}
    runs-on: "torchscience-linux-cuda"
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12" ]
    steps:
      - run: "nvidia-smi"
      - uses: "actions/checkout@v4"
      - name: "Install CUDA Toolkit"
        run: |
          # The runner has CUDA drivers but not the toolkit (nvcc)
          # Install just the CUDA toolkit components we need
          sudo apt-get update
          sudo apt-get install -y cuda-nvcc-12-4 cuda-cudart-dev-12-4
          # Set CUDA_HOME
          export CUDA_HOME=/usr/local/cuda-12.4
          echo "CUDA_HOME=$CUDA_HOME" >> $GITHUB_ENV
          echo "PATH=$CUDA_HOME/bin:$PATH" >> $GITHUB_ENV
          # Verify installation
          /usr/local/cuda-12.4/bin/nvcc --version
      - uses: "astral-sh/setup-uv@v6"
        with:
          python-version: ${{ matrix.python-version }}
      - run: "USE_CUDA=1 uv sync --locked --all-extras --dev"
      - run: "uv run pytest tests"
