[build-system]
requires = [
    "setuptools",
    "torch",
]
build-backend = "setuptools.build_meta"

[project]
name = "torchscience"
version = "0.0.1"
description = "Example of PyTorch C++ and CUDA extensions"
requires-python = ">=3.9"
dependencies = [
    "numpy>=2.0.2",
    "torch",
]

[tool.ruff]
# Line length to match clang-format
line-length = 100
target-version = "py39"

# Enable specific rule sets
lint.select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "NPY",    # numpy-specific rules
    "RUF",    # ruff-specific rules
]

# Ignore specific rules
lint.ignore = [
    "E501",   # Line too long (handled by formatter)
    "B008",   # Do not perform function call in argument defaults
    "N812",   # Lowercase imported as non-lowercase (for torch.nn.functional as F)
]

# Exclude directories
exclude = [
    ".git",
    ".venv",
    ".pytest_cache",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint.per-file-ignores]
# Allow unused imports in __init__.py
"__init__.py" = ["F401"]
# Allow print statements in test files
"tests/**/*.py" = ["T201"]

[tool.ruff.lint.isort]
known-first-party = ["torchscience"]
required-imports = []

[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"
# Indent with spaces
indent-style = "space"
# Respect magic trailing commas
skip-magic-trailing-comma = false
# Auto-detect line endings
line-ending = "auto"

[dependency-groups]
dev = [
    "ipython>=8.18.1",
    "pytest>=8.4.2",
    "hypothesis>=6.0.0",
    "mpmath>=1.3.0",
]
