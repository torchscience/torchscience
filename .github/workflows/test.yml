name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-cuda:
    name: Test CUDA - Python ${{ matrix.python-version }}
    runs-on: "torchscience-linux-cuda"
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12" ]
    steps:
      - run: "nvidia-smi"
      - uses: "actions/checkout@v4"
      - name: "Install CUDA Toolkit"
        run: |
          # The runner has CUDA drivers but not the toolkit (nvcc)
          # Search for available CUDA packages
          echo "Searching for available CUDA packages..."
          sudo apt-get update
          apt-cache search cuda-nvcc | grep -E "cuda-nvcc-[0-9]+" | head -10

          # Install CUDA toolkit
          # Try different package name formats
          sudo apt-get install -y nvidia-cuda-toolkit || \
          sudo apt-get install -y cuda-toolkit-12-4 || \
          sudo apt-get install -y cuda-toolkit || \
          (echo "Failed to install CUDA toolkit" && exit 1)

          # Find where nvcc was installed
          NVCC_PATH=$(which nvcc || find /usr -name nvcc -type f 2>/dev/null | head -1)
          if [ -n "$NVCC_PATH" ]; then
            export CUDA_HOME=$(dirname $(dirname $NVCC_PATH))
            echo "CUDA_HOME=$CUDA_HOME" >> $GITHUB_ENV
            echo "Found nvcc at: $NVCC_PATH"
            echo "Set CUDA_HOME to: $CUDA_HOME"
            $NVCC_PATH --version
          else
            echo "ERROR: nvcc still not found after installation!"
            exit 1
          fi
      - uses: "astral-sh/setup-uv@v6"
        with:
          python-version: ${{ matrix.python-version }}
      - run: "USE_CUDA=1 uv sync --locked --all-extras --dev"
      - run: "uv run pytest tests"
