name: Tests

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --group dev --no-install-project
      - run: uv run --no-project pre-commit run --all-files

  test-cpu:
    needs: [lint]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
        torch-version: [latest]
        include:
          - os: ubuntu-latest
            python-version: "3.13"
            torch-version: "2.9.1"
          - os: ubuntu-latest
            python-version: "3.13"
            torch-version: "2.10"
          - os: macos-latest
            python-version: "3.13"
            torch-version: "2.9.1"
          - os: macos-latest
            python-version: "3.13"
            torch-version: "2.10"
          - os: windows-latest
            python-version: "3.13"
            torch-version: "2.9.1"
          - os: windows-latest
            python-version: "3.13"
            torch-version: "2.10"
        exclude:
          - torch-version: ${{ github.event_name == 'pull_request' && '2.9.1' || 'NONE' }}
          - torch-version: ${{ github.event_name == 'pull_request' && '2.10' || 'NONE' }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        with:
          version: "v0.9.1"

      - name: Configure sccache for CMake
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }} --no-install-project

      - name: Install CPU-only PyTorch (Linux)
        if: runner.os == 'Linux'
        run: uv pip install torch --index-url https://download.pytorch.org/whl/cpu --reinstall

      - name: Override PyTorch version
        if: matrix.torch-version != 'latest'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            uv pip install torch==${{ matrix.torch-version }} --index-url https://download.pytorch.org/whl/cpu
          else
            uv pip install torch==${{ matrix.torch-version }}
          fi

      - name: Install project
        run: uv pip install --no-build-isolation -e .

      - name: Run tests
        run: uv run --no-sync pytest tests/ -v --tb=short --timeout=300

  test-cuda:
    needs: [lint]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # The org only provides a Linux GPU hosted runner
        # (torchscience-linux-cuda); there is no Windows GPU runner, so
        # windows-cuda entries would queue for 24 h and get cancelled.
        runner: [torchscience-linux-cuda]
        python-version: ["3.12", "3.13"]
        torch-version: [latest]
        include:
          - runner: torchscience-linux-cuda
            python-version: "3.13"
            torch-version: "2.9.1"
          - runner: torchscience-linux-cuda
            python-version: "3.13"
            torch-version: "2.10"
        exclude:
          - torch-version: ${{ github.event_name == 'pull_request' && '2.9.1' || 'NONE' }}
          - torch-version: ${{ github.event_name == 'pull_request' && '2.10' || 'NONE' }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        with:
          version: "v0.9.1"

      - name: Configure sccache for CMake
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"

      - name: Set up CUDA toolkit
        shell: bash
        run: |
          # Check common locations first
          if command -v nvcc &>/dev/null; then
            CUDA_HOME="$(dirname "$(dirname "$(command -v nvcc)")")"
          elif [ -d /usr/local/cuda ]; then
            CUDA_HOME=/usr/local/cuda
          elif [ -n "$CUDA_PATH" ]; then
            CUDA_HOME="$CUDA_PATH"
          else
            # Search versioned directories
            for dir in /usr/local/cuda-*; do
              if [ -f "$dir/bin/nvcc" ]; then
                CUDA_HOME="$dir"
                break
              fi
            done
          fi
          # Install if not found (Linux only)
          if [ -z "$CUDA_HOME" ] && [ "$RUNNER_OS" = "Linux" ]; then
            DISTRO=$(. /etc/os-release && echo "${ID}${VERSION_ID}" | tr -d '.')
            ARCH=$(uname -m)
            wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${DISTRO}/${ARCH}/cuda-keyring_1.1-1_all.deb"
            sudo dpkg -i cuda-keyring_1.1-1_all.deb
            sudo apt-get update -qq
            sudo apt-get install -y -qq cuda-toolkit-12-8
            CUDA_HOME=/usr/local/cuda-12.8
          fi
          if [ -n "$CUDA_HOME" ]; then
            echo "CUDA_HOME=$CUDA_HOME" >> "$GITHUB_ENV"
            echo "CUDA_TOOLKIT_ROOT_DIR=$CUDA_HOME" >> "$GITHUB_ENV"
            echo "PATH=$CUDA_HOME/bin:$PATH" >> "$GITHUB_ENV"
            echo "Detected CUDA toolkit at $CUDA_HOME"
          fi

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }} --no-install-project

      - name: Override PyTorch version
        if: matrix.torch-version != 'latest'
        run: uv pip install torch==${{ matrix.torch-version }}

      - name: Install project
        run: uv pip install --no-build-isolation -e .

      - name: CUDA diagnostic
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          # Check compiled architectures in the .so
          SO_PATH=$(uv run --no-sync python -c "import torchscience._csrc as m; print(m.__file__)")
          echo "=== Extension path: $SO_PATH ==="
          if command -v cuobjdump &>/dev/null; then
            echo "=== Compiled CUDA architectures ==="
            cuobjdump --list-elf "$SO_PATH" 2>&1 | head -20 || echo "No ELF sections found"
            cuobjdump --list-ptx "$SO_PATH" 2>&1 | head -20 || echo "No PTX sections found"
          fi
          nvidia-smi --query-gpu=name,compute_cap,driver_version --format=csv 2>/dev/null || true

          uv run --no-sync python -c "
          import torch, sys
          print('PyTorch:', torch.__version__)
          print('CUDA available:', torch.cuda.is_available())
          if not torch.cuda.is_available():
              sys.exit(0)
          print('GPU:', torch.cuda.get_device_name(0))
          cap = torch.cuda.get_device_capability(0)
          print(f'Compute capability: {cap[0]}.{cap[1]}')

          # Verify native PyTorch CUDA works
          x = torch.tensor([1.0, 2.0, 3.0], dtype=torch.float64, device='cuda')
          print(f'torch.sin CUDA: {torch.sin(x).tolist()}')
          torch.cuda.synchronize()

          # Test our custom ops
          import torchscience.special_functions as sf
          for dtype_name, dtype in [('float32', torch.float32), ('float64', torch.float64)]:
              print(f'--- dtype={dtype_name} ---')
              for name in ['gamma', 'digamma', 'sin_pi']:
                  fn = getattr(sf, name)
                  x = torch.tensor([0.5, 1.0, 1.5, 2.0, 2.5], dtype=dtype, device='cuda')
                  y_cuda = fn(x)
                  torch.cuda.synchronize()
                  y_cpu = fn(x.cpu())
                  print(f'{name} CUDA: {y_cuda.cpu().tolist()}')
                  print(f'{name} CPU:  {y_cpu.tolist()}')
          "

      - name: Run CUDA tests
        if: success() || failure()
        run: uv run --no-sync pytest tests/ -v --tb=short --timeout=300 -k "cuda or gpu"

  build-check:
    needs: [lint]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        with:
          version: "v0.9.1"

      - name: Configure sccache for CMake
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --group dev --no-install-project

      - name: Install CPU-only PyTorch (Linux)
        if: runner.os == 'Linux'
        run: uv pip install torch --index-url https://download.pytorch.org/whl/cpu --reinstall

      - name: Build wheel
        run: uv build --wheel --no-build-isolation

      - name: Verify wheel exists
        shell: bash
        run: ls dist/*.whl
