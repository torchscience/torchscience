[build-system]
build-backend = "setuptools.build_meta"
requires = ["numpy>=2.3.4", "setuptools>=61", "torch>=2.9.0"]

[project]
name = "torch-science"
version = "0.1.0"
authors = [
    { name = "Allen Goodman", email = "allen.goodman@icloud.com" }
]
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.3.4",
    "torch>=2.9.0",
]

[project.optional-dependencies]
test = [
    "pytest-benchmark>=5.2.0",
    "pytest-cov>=7.0.0",
    "pytest-error-for-skips>=2.0.2",
    "pytest-instafail>=0.5.0",
    "pytest-mock>=3.15.1",
    "pytest-rerunfailures>=16.1",
    "pytest-timeout>=2.4.0",
    "scipy>=1.16.3",
]
